<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seismic Detection</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        color: #e0e0e0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        background: rgba(30, 30, 60, 0.95);
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        max-width: 550px;
        width: 100%;
        border: 1px solid rgba(100, 100, 200, 0.2);
      }
      h1 {
        font-size: 2.2rem;
        background: linear-gradient(90deg, #667eea, #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 8px;
        font-weight: 600;
      }
      .subtitle {
        font-size: 0.9rem;
        color: #888;
        margin-bottom: 30px;
      }
      p { font-size: 1.05rem; color: #aaa; margin-bottom: 25px; }
      .error {
        background: rgba(220, 53, 69, 0.15);
        border: 1px solid rgba(220, 53, 69, 0.4);
        color: #ff6b6b;
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 0.9rem;
      }
      .upload-area {
        border: 2px dashed rgba(100, 100, 200, 0.3);
        border-radius: 12px;
        padding: 30px;
        margin-bottom: 20px;
        transition: border-color 0.3s;
        cursor: pointer;
      }
      .upload-area:hover { border-color: #667eea; }
      .upload-area label {
        display: block;
        cursor: pointer;
        color: #667eea;
        font-weight: 600;
        font-size: 1rem;
      }
      .upload-area .hint {
        font-size: 0.8rem;
        color: #666;
        margin-top: 8px;
      }
      input[type="file"] { display: none; }
      .file-name {
        color: #667eea;
        font-size: 0.85rem;
        margin-top: 8px;
        display: none;
      }
      .upload-btn {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        padding: 14px 30px;
        font-size: 1rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        width: 100%;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      .upload-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
      }
      footer {
        margin-top: 30px;
        font-size: 0.8rem;
        color: #555;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Seismic Detection</h1>
      <p class="subtitle">NASA Space Apps 2024 — Powered by Deep Learning</p>
      <p>Upload a spectrogram image to detect potential seismic activity on the Moon or Mars.</p>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <form action="/upload" method="post" enctype="multipart/form-data">
        <div class="upload-area" onclick="document.getElementById('file-upload').click()">
          <label for="file-upload">Choose a spectrogram image</label>
          <p class="hint">PNG or JPEG, max 16 MB</p>
          <input id="file-upload" type="file" name="file" accept="image/png, image/jpeg" required />
          <p class="file-name" id="file-name"></p>
        </div>
        <button type="submit" class="upload-btn">Analyze Spectrogram</button>
      </form>

      <footer>
        <p>Seismic Detection &copy; 2024 &mdash; NASA Space Apps Challenge</p>
      </footer>
    </div>

    <script>
      document.getElementById('file-upload').addEventListener('change', function() {
        var name = this.files[0] ? this.files[0].name : '';
        var el = document.getElementById('file-name');
        el.textContent = name;
        el.style.display = name ? 'block' : 'none';
      });
    </script>
  </body>
</html>
